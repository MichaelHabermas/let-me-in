<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Epic 6 — E2E toy pipeline (spike)</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem; max-width: 900px; }
    #log, #timing {
      white-space: pre-wrap;
      background: #111;
      color: #cfc;
      padding: 1rem;
      border-radius: 6px;
      font-size: 12px;
    }
    #timing { margin-top: 0.75rem; min-height: 120px; }
    button { margin: 0.25rem 0.5rem 0.25rem 0; padding: 0.5rem 0.9rem; }
    canvas { display: none; }
  </style>
</head>
<body>
  <h1>Epic 6 — End-to-end toy pipeline</h1>
  <p>
    Serve this folder over HTTP (e.g. <code>python3 -m http.server 8766</code> from
    <code>spikes/epic-06-e2e-toy-pipeline/</code>). Do not open as <code>file://</code> (ORT + module imports).
  </p>
  <p>
    <button type="button" id="btn-run">Run full pipeline (enroll + same-person + stranger)</button>
  </p>
  <h2>Timing table</h2>
  <div id="timing" aria-live="polite">(not run yet)</div>
  <h2>Log</h2>
  <div id="log" aria-live="polite"></div>
  <canvas id="src" width="640" height="640"></canvas>
  <canvas id="lb" width="640" height="640"></canvas>
  <canvas id="emb" width="112" height="112"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
  <script type="module" src="./main.mjs"></script>
</body>
</html>
