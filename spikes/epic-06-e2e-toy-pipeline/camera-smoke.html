<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Epic 8 deploy smoke — camera only</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem; max-width: 720px; }
    #status { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; background: #2a2a2a; color: #eee; }
    #status.error { background: #4a2020; color: #fcc; }
    #status.ok { background: #203a20; color: #cfc; }
    video { max-width: 100%; border: 1px solid #444; border-radius: 6px; background: #000; }
    button { margin-right: 0.5rem; padding: 0.45rem 0.85rem; }
    .note { font-size: 0.9rem; color: #555; }
  </style>
</head>
<body>
  <h1>Deploy smoke — live camera</h1>
  <p class="note">
    Epic 8 only: checks HTTPS + camera on the <strong>same public address</strong> as the E2E demo.
    No face pipeline here; use <a href="./index.html">index.html</a> for the toy pipeline.
  </p>
  <div id="status" role="status">Idle — press Start to request the camera.</div>
  <p>
    <button type="button" id="btn-start">Start camera</button>
    <button type="button" id="btn-stop">Stop</button>
  </p>
  <video id="video" playsinline muted autoplay width="640" height="360"></video>
  <script type="module" src="./camera-smoke.mjs"></script>
</body>
</html>
