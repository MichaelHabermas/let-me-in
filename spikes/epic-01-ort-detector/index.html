<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Epic 1 spike — ORT-web detector gate zero</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem; max-width: 960px; }
    #log {
      white-space: pre-wrap;
      background: #111;
      color: #cfc;
      padding: 1rem;
      border-radius: 6px;
      font-size: 12px;
      min-height: 200px;
    }
    button { margin-right: 0.5rem; margin-bottom: 0.5rem; padding: 0.4rem 0.8rem; }
    #prep { display: none; }
    .preview-wrap { margin: 0.5rem 0; }
    #cam {
      max-width: 320px;
      border-radius: 6px;
      background: #222;
    }
  </style>
</head>
<body>
  <h1>Epic 1 — ORT-web + YOLOv9 ONNX (spike)</h1>
  <p>Open DevTools console for full ORT verbose lines. Serve this folder over HTTP (not <code>file://</code>).</p>
  <p>
    <button type="button" id="btn-run">Run gate zero (load + preprocess + infer)</button>
    <button type="button" id="btn-cam">Start camera (Epic 2 path)</button>
    <button type="button" id="btn-e1t9" disabled>E1-T9 — N=12 live-frame infer (median vs 500 ms)</button>
    <button type="button" id="btn-clear">Clear log</button>
  </p>
  <div class="preview-wrap">
    <video id="cam" playsinline muted></video>
  </div>
  <div id="log"></div>
  <canvas id="prep" width="640" height="640"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
