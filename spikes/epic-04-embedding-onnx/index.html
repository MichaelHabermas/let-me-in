<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Epic 4 spike — face embedding ONNX (ORT-web)</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem; max-width: 960px; }
    #log {
      white-space: pre-wrap;
      background: #111;
      color: #cfc;
      padding: 1rem;
      border-radius: 6px;
      font-size: 12px;
      min-height: 240px;
    }
    button { margin: 0.25rem 0.5rem 0.25rem 0; padding: 0.4rem 0.8rem; }
    #prep { display: none; }
  </style>
</head>
<body>
  <h1>Epic 4 — Embedding ONNX (ORT-web)</h1>
  <p>Serve this folder over HTTP (<code>python3 -m http.server</code> or similar). Open DevTools for ORT verbose logs.</p>
  <p>
    <button type="button" id="btn-gate">E4-T4–T6 — load + first forward + L2 check</button>
    <button type="button" id="btn-sanity">E4-T7 — same vs different cosines</button>
    <button type="button" id="btn-bench">E4-T8 — benchmark (≥20 runs, WebGL vs WASM)</button>
    <button type="button" id="btn-clear">Clear log</button>
  </p>
  <div id="log"></div>
  <canvas id="prep" width="112" height="112"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
