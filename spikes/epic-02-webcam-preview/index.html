<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Epic 2 spike — webcam capture &amp; preview</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem; max-width: 960px; }
    #log {
      white-space: pre-wrap;
      background: #111;
      color: #cfc;
      padding: 1rem;
      border-radius: 6px;
      font-size: 12px;
      min-height: 220px;
    }
    #status {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      background: #2a2a2a;
      color: #eee;
    }
    #status.error { background: #4a2020; color: #fcc; }
    #status.ok { background: #203a20; color: #cfc; }
    button { margin-right: 0.5rem; margin-bottom: 0.5rem; padding: 0.4rem 0.8rem; }
    video, canvas {
      max-width: 100%;
      border: 1px solid #444;
      border-radius: 6px;
      background: #000;
    }
    .row { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; }
  </style>
</head>
<body>
  <h1>Epic 2 — Webcam preview (throwaway spike)</h1>
  <p>
    Serve this folder over <strong>http://localhost</strong> or <strong>HTTPS</strong>.
    <code>file://</code> will not expose <code>getUserMedia</code>.
    Example: <code>npx serve .</code> from this directory.
  </p>
  <div id="status" role="status">Idle — press Start to request camera.</div>
  <p>
    <button type="button" id="btn-start">Start camera</button>
    <button type="button" id="btn-stop">Stop</button>
    <button type="button" id="btn-clear">Clear log</button>
    <button type="button" id="btn-deny-test" title="Triggers getUserMedia with impossible deviceId to exercise E2-T5 catch path">
      Test error path (invalid device)
    </button>
  </p>
  <div class="row">
    <div>
      <p><strong>Video</strong> (stream)</p>
      <video id="video" playsinline muted autoplay width="640" height="360"></video>
    </div>
    <div>
      <p><strong>Canvas</strong> (rAF copy, ML off)</p>
      <canvas id="canvas" width="640" height="360"></canvas>
    </div>
  </div>
  <h2>Measurements</h2>
  <div id="log" aria-live="polite"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
