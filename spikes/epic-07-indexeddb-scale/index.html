<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Epic 7 — IndexedDB scale spike</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 56rem;
        margin: 1rem auto;
        padding: 0 1rem;
      }
      pre#log {
        background: #111;
        color: #e8e8e8;
        padding: 1rem;
        overflow: auto;
        max-height: 28rem;
        font-size: 0.8rem;
      }
      #timing {
        margin-top: 0.5rem;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
      }
      button {
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
        padding: 0.4rem 0.75rem;
      }
    </style>
  </head>
  <body>
    <h1>Epic 7 — IndexedDB scale (disposable)</h1>
    <p>50 synthetic users: 512 floats + 16×16 PNG thumb. Serve over HTTP (not file://).</p>
    <button type="button" id="btn-run">Run full spike (seed + bench + storage)</button>
    <button type="button" id="btn-clear">Delete database</button>
    <h2>Log</h2>
    <pre id="log"></pre>
    <h2>JSON (timing / scraper)</h2>
    <div id="timing"></div>
    <script type="module">
      import { runFullSpike } from "./main.js";

      const logEl = document.getElementById("log");
      const timingEl = document.getElementById("timing");

      function log(s) {
        logEl.textContent += s + "\n";
      }

      document.getElementById("btn-run").addEventListener("click", async () => {
        logEl.textContent = "";
        timingEl.textContent = "";
        try {
          const result = await runFullSpike({ log });
          timingEl.textContent = JSON.stringify(result, null, 2);
        } catch (e) {
          log(`UNCAUGHT: ${String(e)}`);
          timingEl.textContent = JSON.stringify({ error: String(e) }, null, 2);
        }
      });

      document.getElementById("btn-clear").addEventListener("click", () => {
        const req = indexedDB.deleteDatabase("epic07_scale_spike");
        req.onsuccess = () => {
          logEl.textContent = "Database deleted.\n";
          timingEl.textContent = "";
        };
        req.onerror = () => {
          logEl.textContent = "Delete failed: " + String(req.error) + "\n";
        };
      });
    </script>
  </body>
</html>
